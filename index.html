<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Engine - Dark Theme</title>
    <style>
        :root {
            --primary: #4285f4;
            --primary-hover: #3367d6;
            --text: #e8eaed;
            --text-secondary: #9aa0a6;
            --background: #202124;
            --card-background: #2b2b2b;
            --border: #3c4043;
            --shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
            --success: #34a853;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 15px 0;
            margin-bottom: 20px;
        }

        .donation-btn {
            background-color: #1a1a1a;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s ease;
            margin-left: 10px;
        }

        .donation-btn:hover {
            background-color: #333;
            border-color: var(--primary);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            height: 40px;
        }

        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 584px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 24px 0 0 24px;
            background-color: var(--card-background);
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        .search-button {
            padding: 0 24px;
            border: 1px solid var(--primary);
            background-color: var(--primary);
            color: white;
            border-radius: 0 24px 24px 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }

        .search-button:hover {
            background-color: var(--primary-hover);
        }

        .search-options {
            display: flex;
            margin-bottom: 30px;
            gap: 20px;
        }

        .option-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .option-btn.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .option-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .ads-container {
            width: 100%;
            margin-bottom: 20px;
        }

        .ad-placeholder {
            background-color: #303134;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }

        footer {
            margin-top: auto;
            padding: 20px 0;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .search-box {
                flex-direction: column;
            }

            .search-input {
                border-radius: 24px;
                border-bottom: none;
            }

            .search-button {
                border-radius: 24px;
                border-top: none;
                padding: 12px;
                margin-top: 8px;
            }

            .search-options {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="https://ko-fi.com/yourusername" target="_blank" rel="noopener noreferrer" class="donation-btn">Support Us</a>
        </header>

        <div class="logo">
            <h1>Search Engine</h1>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" placeholder="Search the web..." autocomplete="off">
                <button class="search-button">Search</button>
            </div>

            <div class="search-options">
                <button class="option-btn active">All</button>
                <button class="option-btn">Images</button>
                <button class="option-btn">Videos</button>
                <button class="option-btn">News</button>
                <button class="option-btn">Maps</button>
            </div>

            <div class="ads-container">
                <div class="ad-placeholder">
                    Ad space - Google AdSense
                </div>
            </div>
        </div>

        <footer>
            <span>© 2023 Search Engine</span>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Settings</a>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Search functionality
            const searchInput = document.querySelector('.search-input');
            const searchButton = document.querySelector('.search-button');
            const optionButtons = document.querySelectorAll('.option-btn');

            // Search form submission
            function performSearch() {
                const query = searchInput.value.trim();
                if (query) {
                    const activeOption = document.querySelector('.option-btn.active');
                    const searchType = activeOption.textContent.toLowerCase();

                    // In a real implementation, this would submit to a backend
                    console.log('Searching for:', query, 'in:', searchType);

                    // Simulate search (in real app, would redirect to results page)
                    alert(`Searching for "${query}" in ${searchType} (simulated)`);
                } else {
                    searchInput.focus();
                }
            }

            // Event listeners
            searchButton.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            // Option buttons
            optionButtons.forEach(button => {
                button.addEventListener('click', function() {
                    optionButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Focus input on page load
            searchInput.focus();
        });
    </script>
</body>
</html>
